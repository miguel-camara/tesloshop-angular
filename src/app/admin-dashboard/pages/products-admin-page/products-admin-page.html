@if (productsResource.hasValue()) {
  <h1 class="text-2xl font-bold ml-8">Listado de productos</h1>
  <h3 class="text-lg ml-8">
    Total de productos
    <span class="text-accent">{{ productsResource.value().count }}</span>
  </h3>

  <div class="divider"></div>

  <div class="flex flex-col justify-center">
    <div class="flex gap-2 items-center ml-8 h-20">
      <app-pagination
        [pages]="productsResource.value().pages"
        [currentPage]="paginationService.currentPage()"
      />

      <select
        class="select select-bordered w-32"
        (change)="productsPerPage.set(+selectPerPage.value)"
        #selectPerPage
      >
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
        <option value="100">100</option>
      </select>

      <div class="flex flex-1"></div>

      <button class="btn btn-soft btn-primary mr-8" routerLink="/admin/product/new">
        Nuevo producto
      </button>
    </div>

    <!-- Listado -->
    <product-table class="mx-8" [products]="productsResource.value().products" />
  </div>
} @else {
  <app-loading />
}
